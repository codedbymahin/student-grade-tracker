name: student_grade_tracker
description: "A clean Flutter app that tracks student subjects, marks, and grades with live summary and swipe-to-delete."
publish_to: 'none'
version: 1.0.0+1
repository: https://github.com/example/student_grade_tracker

environment:
  sdk: ^3.3.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
